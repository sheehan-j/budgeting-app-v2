services:
    db:
        image: postgres:14-alpine
        container_name: budgeting-db
        restart: unless-stopped
        environment:
            POSTGRES_DB: budgeting
            POSTGRES_USER: budgeting
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U budgeting -d budgeting"]
            interval: 10s
            timeout: 5s
            retries: 5
        ports:
          - "127.0.0.1:5433:5432"

    api:
        build:
            context: /home/jsheehan/budgeting-app-v2
            dockerfile: apps/api/Dockerfile
        container_name: budgeting-api
        restart: unless-stopped
        env_file:
            - /home/jsheehan/budgeting-app-v2/apps/api/.env.production
        depends_on:
            db:
                condition: service_healthy
        ports:
            - "127.0.0.1:6767:6767"

volumes:
    postgres_data:
