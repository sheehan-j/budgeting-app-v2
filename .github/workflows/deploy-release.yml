name: Deploy Release

on:
  push:
    branches:
      - release

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to VPS over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            cd /home/jsheehan/budgeting-app-v2
            git fetch origin
            git checkout release
            git reset --hard origin/release

            npm ci
            npm run build:web

            mkdir -p /var/www/budgeting-app
            cp -r apps/web/dist/* /var/www/budgeting-app/
            cp docker-compose.yaml /opt/stacks/budgeting-app/compose.yaml

            cd /opt/stacks/budgeting-app
            docker compose up -d --build

            export PGHOST=127.0.0.1
            export PGPORT=5433
            export PGDATABASE=budgeting
            export PGUSER=budgeting
            export PGPASSWORD='${{ secrets.POSTGRES_PASSWORD }}'
            test -n "$PGPASSWORD"
            export DATABASE_URL="postgresql://$PGUSER@$PGHOST:$PGPORT/$PGDATABASE"
            cd /home/jsheehan/budgeting-app-v2/apps/api
            # Apply only committed migrations; new schema changes still need a generated migration checked into git.
            npx drizzle-kit migrate
